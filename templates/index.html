<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>IBN Gateway</title>
<style>
body{font-family:monospace;background:#0a0c10;color:#c8cdd8;padding:40px;max-width:800px;margin:0 auto}
h1{color:#00d4ff}
textarea{width:100%;height:80px;background:#111318;border:1px solid #252830;color:#c8cdd8;padding:10px;border-radius:6px;font-family:monospace}
button{background:#00d4ff;color:#0a0c10;border:none;padding:10px 24px;border-radius:4px;cursor:pointer;font-weight:bold;margin-top:8px}
pre{background:#111318;padding:16px;border-radius:6px;overflow-x:auto;font-size:12px;border:1px solid #252830}
a{color:#00d4ff}
</style></head>
<body>
<h1>IBN Gateway</h1>
<p>Submit a network intent below or go to <a href="/api/docs">/api/docs</a> for full API.</p>
<textarea id="txt" placeholder="e.g. block IoT VLAN 300 from corporate network"></textarea>
<br>
<button onclick="submit()">Submit Intent →</button>
<pre id="out">Response will appear here...</pre>
<script>
async function submit(){
  const text=document.getElementById('txt').value;
  document.getElementById('out').textContent='Processing...';
  const r=await fetch('/api/channel/0/prompt',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text,simulate:true,deploy:false})});
  const d=await r.json();
  document.getElementById('out').textContent=JSON.stringify(d,null,2);
}
</script>
</body></html>
