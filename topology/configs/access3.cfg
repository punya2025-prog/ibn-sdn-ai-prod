hostname campus-access3
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.43/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
vlan 600,700,900
!
interface Ethernet1
   description Uplink to dist2
   switchport mode trunk
   switchport trunk allowed vlan 600,700,900
!
interface Ethernet2
   description Prod workstation
   switchport access vlan 600
!
interface Ethernet3
   description PLC SCADA
   switchport access vlan 700
!
interface Ethernet4
   description UCM server
   switchport access vlan 900
!
