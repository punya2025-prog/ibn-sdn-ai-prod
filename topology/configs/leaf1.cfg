hostname dc-leaf1
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.21/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
interface Loopback0
   ip address 10.255.0.11/32
!
interface Ethernet1
   description To dc-spine1
   no switchport
   ip address 10.0.0.1/31
!
interface Ethernet2
   description To dc-spine2
   no switchport
   ip address 10.0.0.9/31
!
interface Ethernet3
   description Finance host
   switchport access vlan 100
!
interface Ethernet4
   description HR host
   switchport access vlan 200
!
interface Ethernet5
   description Guest host
   switchport access vlan 400
!
vlan 100,200,400,500
!
ip routing
!
router bgp 65011
   router-id 10.255.0.11
   neighbor 10.0.0.0 remote-as 65000
   neighbor 10.0.0.8 remote-as 65000
!
