hostname campus-access4
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.44/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
vlan 1000,1100,1200,1300
!
interface Ethernet1
   description Uplink to dist2
   switchport mode trunk
   switchport trunk allowed vlan 1000,1100,1200,1300
!
interface Ethernet2
   description Printer
   switchport access vlan 1000
!
interface Ethernet3
   description CCTV camera
   switchport access vlan 1100
!
interface Ethernet4
   description Billing server
   switchport access vlan 1200
!
interface Ethernet5
   description Management server
   switchport access vlan 1300
!
