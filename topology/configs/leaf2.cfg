hostname dc-leaf2
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.22/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
interface Loopback0
   ip address 10.255.0.12/32
!
interface Ethernet1
   description To dc-spine1
   no switchport
   ip address 10.0.0.3/31
!
interface Ethernet2
   description To dc-spine2
   no switchport
   ip address 10.0.0.11/31
!
interface Ethernet3
   description IoT host
   switchport access vlan 300
!
interface Ethernet4
   description Prod host
   switchport access vlan 600
!
interface Ethernet5
   description SCADA host
   switchport access vlan 700
!
vlan 300,600,700,800
!
ip routing
!
router bgp 65012
   router-id 10.255.0.12
   neighbor 10.0.0.2  remote-as 65000
   neighbor 10.0.0.10 remote-as 65000
!
