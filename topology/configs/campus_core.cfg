hostname campus-core1
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.31/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
vlan 100,200,300,400,500,600,700,800,900,1000,1100,1200,1300
!
interface Ethernet1
   description To dc-leaf4
   switchport mode trunk
!
interface Ethernet2
   description To campus-dist1
   switchport mode trunk
!
interface Ethernet3
   description To campus-dist2
   switchport mode trunk
!
