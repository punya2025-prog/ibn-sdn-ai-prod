hostname campus-dist2
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.33/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
vlan 600,700,900,1000,1100,1200,1300
!
interface Ethernet1
   description To campus-core
   switchport mode trunk
!
interface Ethernet2
   description To campus-access3
   switchport mode trunk
   switchport trunk allowed vlan 600,700,900
!
interface Ethernet3
   description To campus-access4
   switchport mode trunk
   switchport trunk allowed vlan 1000,1100,1200,1300
!
spanning-tree mode rapid-pvst
!
