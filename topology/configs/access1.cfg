hostname campus-access1
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.41/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
vlan 100,200,400
!
interface Ethernet1
   description Uplink to dist1
   switchport mode trunk
   switchport trunk allowed vlan 100,200,400
!
interface Ethernet2
   description Finance workstation
   switchport access vlan 100
!
interface Ethernet3
   description HR workstation
   switchport access vlan 200
!
interface Ethernet4
   description Guest endpoint
   switchport access vlan 400
!
