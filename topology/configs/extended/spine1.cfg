hostname dc-spine1
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.11/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
management api netconf
   transport ssh default
   no shutdown
!
lldp run
!
interface Loopback0
   ip address 10.255.0.1/32
!
interface Ethernet49
   description To dc-leaf1
   no switchport
   ip address 10.0.0.0/31
   no shutdown
!
interface Ethernet50
   description To dc-leaf2
   no switchport
   ip address 10.0.0.2/31
   no shutdown
!
interface Ethernet51
   description To dc-leaf3
   no switchport
   ip address 10.0.0.4/31
   no shutdown
!
interface Ethernet52
   description To dc-leaf4
   no switchport
   ip address 10.0.0.6/31
   no shutdown
!
ip routing
!
router bgp 65000
   router-id 10.255.0.1
   maximum-paths 4
   neighbor 10.0.0.1 remote-as 65011
   neighbor 10.0.0.1 description dc-leaf1
   neighbor 10.0.0.3 remote-as 65012
   neighbor 10.0.0.3 description dc-leaf2
   neighbor 10.0.0.5 remote-as 65013
   neighbor 10.0.0.5 description dc-leaf3
   neighbor 10.0.0.7 remote-as 65014
   neighbor 10.0.0.7 description dc-leaf4
   redistribute connected
!
end
