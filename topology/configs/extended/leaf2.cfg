hostname dc-leaf2
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.22/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
management api netconf
   transport ssh default
   no shutdown
!
lldp run
!
interface Loopback0
   ip address 10.255.0.12/32
!
vlan 300
vlan 600
vlan 700
vlan 800
!
interface Ethernet49
   description To dc-spine1 uplink
   no switchport
   ip address 10.0.0.3/31
   no shutdown
!
interface Ethernet50
   description To dc-spine2 uplink
   no switchport
   ip address 10.0.0.11/31
   no shutdown
!
ip routing
!
router bgp 65012
   router-id 10.255.0.12
   maximum-paths 4
   neighbor 10.0.0.2 remote-as 65000
   neighbor 10.0.0.10 remote-as 65000
   redistribute connected
!
end
