hostname campus-dist2
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.33/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
management api netconf
   transport ssh default
   no shutdown
!
lldp run
!
vlan 600
vlan 700
vlan 900
vlan 1100
vlan 1200
vlan 1300
vlan 1400
vlan 1500
vlan 1600
vlan 1700
vlan 1800
!
interface Ethernet49
   description To campus-core Eth51
   switchport mode trunk
   switchport trunk allowed vlan 100,200,300,400,500,600,700,800,900,1000,1100,1200,1300,1400,1500,1600,1700,1800,1900
   no shutdown
!
interface Ethernet50
   description To campus-access3 Eth49
   switchport mode trunk
   switchport trunk allowed vlan 600,700,900,1100,1800,800
   no shutdown
!
interface Ethernet51
   description To campus-access4 Eth49
   switchport mode trunk
   switchport trunk allowed vlan 1200,1400,1500,1600,1700,1300,1100,1800
   no shutdown
!
spanning-tree mode rapid-pvst
spanning-tree vlan 600,700,900,1100,1200,1300,1400,1500,1600,1700,1800 priority 8192
!
end
