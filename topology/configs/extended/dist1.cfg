hostname campus-dist1
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.32/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
management api netconf
   transport ssh default
   no shutdown
!
lldp run
!
vlan 100
vlan 200
vlan 300
vlan 400
vlan 500
vlan 800
vlan 1000
vlan 1100
vlan 1800
vlan 1900
!
interface Ethernet49
   description To campus-core Eth50
   switchport mode trunk
   switchport trunk allowed vlan 100,200,300,400,500,600,700,800,900,1000,1100,1200,1300,1400,1500,1600,1700,1800,1900
   no shutdown
!
interface Ethernet50
   description To campus-access1 Eth49
   switchport mode trunk
   switchport trunk allowed vlan 100,200,400,800,1000,1100,1800,1900
   no shutdown
!
interface Ethernet51
   description To campus-access2 Eth49
   switchport mode trunk
   switchport trunk allowed vlan 300,500,800,1100,1800
   no shutdown
!
spanning-tree mode rapid-pvst
spanning-tree vlan 100,200,300,400,500,800,1000,1100,1800,1900 priority 8192
!
end
