hostname dc-spine2
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.12/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
management api netconf
   transport ssh default
   no shutdown
!
lldp run
!
interface Loopback0
   ip address 10.255.0.2/32
!
interface Ethernet49
   description To dc-leaf1
   no switchport
   ip address 10.0.0.8/31
   no shutdown
!
interface Ethernet50
   description To dc-leaf2
   no switchport
   ip address 10.0.0.10/31
   no shutdown
!
interface Ethernet51
   description To dc-leaf3
   no switchport
   ip address 10.0.0.12/31
   no shutdown
!
interface Ethernet52
   description To dc-leaf4
   no switchport
   ip address 10.0.0.14/31
   no shutdown
!
ip routing
!
router bgp 65000
   router-id 10.255.0.2
   maximum-paths 4
   neighbor 10.0.0.9 remote-as 65011
   neighbor 10.0.0.9 description dc-leaf1
   neighbor 10.0.0.11 remote-as 65012
   neighbor 10.0.0.11 description dc-leaf2
   neighbor 10.0.0.13 remote-as 65013
   neighbor 10.0.0.13 description dc-leaf3
   neighbor 10.0.0.15 remote-as 65014
   neighbor 10.0.0.15 description dc-leaf4
   redistribute connected
!
end
