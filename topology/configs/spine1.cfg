hostname dc-spine1
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.11/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
interface Loopback0
   ip address 10.255.0.1/32
!
interface Ethernet1
   description To dc-leaf1
   no switchport
   ip address 10.0.0.0/31
!
interface Ethernet2
   description To dc-leaf2
   no switchport
   ip address 10.0.0.2/31
!
interface Ethernet3
   description To dc-leaf3
   no switchport
   ip address 10.0.0.4/31
!
interface Ethernet4
   description To dc-leaf4
   no switchport
   ip address 10.0.0.6/31
!
ip routing
!
router bgp 65000
   router-id 10.255.0.1
   neighbor 10.0.0.1 remote-as 65011
   neighbor 10.0.0.3 remote-as 65012
   neighbor 10.0.0.5 remote-as 65013
   neighbor 10.0.0.7 remote-as 65014
!
