hostname campus-dist1
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.32/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
vlan 100,200,300,400,500,800
!
interface Ethernet1
   description To campus-core
   switchport mode trunk
!
interface Ethernet2
   description To campus-access1
   switchport mode trunk
   switchport trunk allowed vlan 100,200,400
!
interface Ethernet3
   description To campus-access2
   switchport mode trunk
   switchport trunk allowed vlan 300,500,800
!
spanning-tree mode rapid-pvst
spanning-tree vlan 100,200,300,400,500,800 priority 4096
!
