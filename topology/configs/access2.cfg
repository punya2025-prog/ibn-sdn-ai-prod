hostname campus-access2
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.42/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
vlan 300,500,800
!
interface Ethernet1
   description Uplink to dist1
   switchport mode trunk
   switchport trunk allowed vlan 300,500,800
!
interface Ethernet2
   description IoT sensor
   switchport access vlan 300
!
interface Ethernet3
   description Dev workstation
   switchport access vlan 500
!
interface Ethernet4
   description IP phone
   switchport access vlan 800
!
