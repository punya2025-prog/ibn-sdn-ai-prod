hostname dc-leaf3
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.23/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
interface Loopback0
   ip address 10.255.0.13/32
!
interface Ethernet1
   description To dc-spine1
   no switchport
   ip address 10.0.0.5/31
!
interface Ethernet2
   description To dc-spine2
   no switchport
   ip address 10.0.0.13/31
!
interface Ethernet3
   description VoIP host
   switchport access vlan 800
!
interface Ethernet4
   description Billing host
   switchport access vlan 1200
!
interface Ethernet5
   description CCTV host
   switchport access vlan 1100
!
vlan 800,900,1100,1200
!
ip routing
!
router bgp 65013
   router-id 10.255.0.13
   neighbor 10.0.0.4  remote-as 65000
   neighbor 10.0.0.12 remote-as 65000
!
