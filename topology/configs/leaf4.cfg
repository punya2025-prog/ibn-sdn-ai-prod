hostname dc-leaf4
!
username admin privilege 15 role network-admin secret admin
!
interface Management0
   ip address 10.200.0.24/24
   no shutdown
!
management ssh
   idle-timeout 0
   authentication mode password
   no shutdown
!
management api http-commands
   protocol http
   no shutdown
!
interface Loopback0
   ip address 10.255.0.14/32
!
interface Ethernet1
   description To dc-spine1
   no switchport
   ip address 10.0.0.7/31
!
interface Ethernet2
   description To dc-spine2
   no switchport
   ip address 10.0.0.15/31
!
interface Ethernet3
   description Mgmt host
   switchport access vlan 1300
!
interface Ethernet4
   description To campus-core
   switchport mode trunk
!
vlan 400,600,1300
!
ip routing
!
router bgp 65014
   router-id 10.255.0.14
   neighbor 10.0.0.6  remote-as 65000
   neighbor 10.0.0.14 remote-as 65000
!
